<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SpamShield — Email Classifier</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    :root[data-theme="dark"] {
      --bg: #0d0d14;
      --surface: #13131f;
      --card: #1a1a2e;
      --border: #2a2a45;
      --text: #e8e8f0;
      --text-muted: #6b6b8a;
      --user-bubble: #4f46e5;
      --user-bubble-text: #ffffff;
      --bot-bubble: #1e1e32;
      --bot-bubble-text: #e8e8f0;
      --input-bg: #1a1a2e;
      --input-border: #2a2a45;
      --spam: #ef4444;
      --spam-glow: rgba(239,68,68,0.25);
      --ham: #22c55e;
      --ham-glow: rgba(34,197,94,0.25);
      --accent: #6366f1;
      --send-btn: #4f46e5;
      --toggle-bg: #2a2a45;
      --shadow: rgba(0,0,0,0.5);
      --header-bg: #13131f;
      --scanner-line: rgba(99,102,241,0.15);
    }

    :root[data-theme="light"] {
      --bg: #f0f0f8;
      --surface: #ffffff;
      --card: #ffffff;
      --border: #e0e0ef;
      --text: #1a1a2e;
      --text-muted: #8888aa;
      --user-bubble: #4f46e5;
      --user-bubble-text: #ffffff;
      --bot-bubble: #f0f0f8;
      --bot-bubble-text: #1a1a2e;
      --input-bg: #f8f8ff;
      --input-border: #d0d0e8;
      --spam: #dc2626;
      --spam-glow: rgba(220,38,38,0.15);
      --ham: #16a34a;
      --ham-glow: rgba(22,163,74,0.15);
      --accent: #4f46e5;
      --send-btn: #4f46e5;
      --toggle-bg: #e0e0ef;
      --shadow: rgba(0,0,0,0.1);
      --header-bg: #ffffff;
      --scanner-line: rgba(79,70,229,0.08);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: background 0.4s ease, color 0.4s ease;
      overflow: hidden;
    }

    /* Animated background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--scanner-line) 1px, transparent 1px),
        linear-gradient(90deg, var(--scanner-line) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
      transition: background-image 0.4s ease;
    }

    .app-wrapper {
      width: 100%;
      max-width: 680px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
      z-index: 1;
    }

    /* Header */
    header {
      background: var(--header-bg);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      transition: background 0.4s ease, border-color 0.4s ease;
      backdrop-filter: blur(10px);
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo-icon {
      width: 38px;
      height: 38px;
      background: var(--accent);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 20px rgba(99,102,241,0.4);
      flex-shrink: 0;
      color: #ffffff;
    }

    .icon {
      width: 18px;
      height: 18px;
      stroke-width: 2.2;
      flex-shrink: 0;
    }

    .logo-icon .icon {
      width: 21px;
      height: 21px;
    }

    .logo-text {
      display: flex;
      flex-direction: column;
    }

    .logo-title {
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: var(--text);
      line-height: 1;
    }

    .logo-sub {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-top: 2px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .status-dot {
      display: flex;
      align-items: center;
      gap: 6px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--ham);
      letter-spacing: 0.5px;
    }

    .dot {
      width: 7px;
      height: 7px;
      background: var(--ham);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    /* Toggle switch */
    .toggle-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .toggle-label {
      font-family: 'JetBrains Mono', monospace;
      color: var(--text-muted);
      letter-spacing: 0.5px;
    }

    .toggle-label .icon {
      width: 14px;
      height: 14px;
    }

    .toggle {
      position: relative;
      width: 44px;
      height: 24px;
      cursor: pointer;
    }

    .toggle input { display: none; }

    .toggle-track {
      position: absolute;
      inset: 0;
      background: var(--toggle-bg);
      border-radius: 999px;
      transition: background 0.3s;
      border: 1px solid var(--border);
    }

    .toggle-thumb {
      position: absolute;
      top: 3px;
      left: 3px;
      width: 16px;
      height: 16px;
      background: var(--accent);
      border-radius: 50%;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #ffffff;
    }

    .toggle-thumb .icon {
      width: 10px;
      height: 10px;
    }

    .toggle input:checked ~ .toggle-thumb {
      transform: translateX(20px);
    }

    /* Chat area */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      scroll-behavior: smooth;
    }

    .chat-area::-webkit-scrollbar { width: 4px; }
    .chat-area::-webkit-scrollbar-track { background: transparent; }
    .chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* Welcome message */
    .welcome {
      text-align: center;
      padding: 32px 20px;
      animation: fadeUp 0.6s ease both;
    }

    .welcome-icon {
      margin-bottom: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      animation: float 3s ease-in-out infinite;
      color: var(--accent);
    }

    .welcome-icon .icon {
      width: 52px;
      height: 52px;
      stroke-width: 1.8;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .welcome h2 {
      font-size: 22px;
      font-weight: 800;
      color: var(--text);
      margin-bottom: 8px;
    }

    .welcome p {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.6;
      max-width: 340px;
      margin: 0 auto;
    }

    .example-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 20px;
    }

    .chip {
      background: var(--bot-bubble);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 6px 14px;
      font-size: 12px;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'JetBrains Mono', monospace;
    }

    .chip:hover {
      border-color: var(--accent);
      color: var(--accent);
      transform: translateY(-1px);
    }

    /* Message bubbles */
    .message {
      display: flex;
      gap: 10px;
      animation: fadeUp 0.3s ease both;
      max-width: 85%;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }

    .message.bot {
      align-self: flex-start;
    }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 2px;
      color: #ffffff;
    }

    .message.user .avatar {
      background: var(--user-bubble);
    }

    .message.bot .avatar {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--accent);
    }

    .avatar .icon {
      width: 16px;
      height: 16px;
    }

    .bubble {
      padding: 12px 16px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.6;
      transition: background 0.3s;
    }

    .message.user .bubble {
      background: var(--user-bubble);
      color: var(--user-bubble-text);
      border-bottom-right-radius: 4px;
    }

    .message.bot .bubble {
      background: var(--bot-bubble);
      color: var(--bot-bubble-text);
      border-bottom-left-radius: 4px;
      border: 1px solid var(--border);
    }

    /* Result bubble */
    .result-bubble {
      padding: 16px 20px;
      border-radius: 16px;
      border-bottom-left-radius: 4px;
      border: 1px solid;
      font-family: 'JetBrains Mono', monospace;
      animation: resultPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    @keyframes resultPop {
      from { opacity: 0; transform: scale(0.85); }
      to { opacity: 1; transform: scale(1); }
    }

    .result-bubble.spam {
      background: var(--spam-glow);
      border-color: var(--spam);
      color: var(--spam);
    }

    .result-bubble.ham {
      background: var(--ham-glow);
      border-color: var(--ham);
      color: var(--ham);
    }

    .result-label {
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 4px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .result-label .icon {
      width: 20px;
      height: 20px;
    }

    .result-sub {
      font-size: 11px;
      opacity: 0.7;
      letter-spacing: 0.5px;
    }

    /* Typing indicator */
    .typing {
      display: flex;
      gap: 4px;
      align-items: center;
      padding: 14px 16px;
    }

    .typing span {
      width: 7px;
      height: 7px;
      background: var(--text-muted);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40% { transform: translateY(-6px); opacity: 1; }
    }

    /* Input area */
    .input-area {
      padding: 16px 20px 20px;
      background: var(--header-bg);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
      transition: background 0.4s ease, border-color 0.4s ease;
    }

    .input-wrap {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: 16px;
      padding: 10px 10px 10px 16px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .input-wrap:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
    }

    textarea {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      resize: none;
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-size: 14px;
      color: var(--text);
      line-height: 1.5;
      max-height: 120px;
      min-height: 24px;
      overflow-y: auto;
    }

    textarea::placeholder { color: var(--text-muted); }

    textarea::-webkit-scrollbar { width: 3px; }
    textarea::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    .send-btn {
      width: 38px;
      height: 38px;
      background: var(--send-btn);
      border: none;
      border-radius: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
      box-shadow: 0 4px 12px rgba(79,70,229,0.4);
    }

    .send-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 16px rgba(79,70,229,0.5); }
    .send-btn:active { transform: translateY(0); }
    .send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .send-btn .icon {
      width: 17px;
      height: 17px;
      color: #ffffff;
    }

    .input-hint {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: var(--text-muted);
      text-align: center;
      margin-top: 10px;
      letter-spacing: 0.3px;
    }
  </style>
</head>
<body>
<div class="app-wrapper">

  <!-- Header -->
  <header>
    <div class="logo">
      <div class="logo-icon"><i data-lucide="shield-check" class="icon"></i></div>
      <div class="logo-text">
        <span class="logo-title">SpamShield</span>
        <span class="logo-sub">AI Classifier v1.0</span>
      </div>
    </div>
    <div class="header-right">
      <div class="status-dot">
        <div class="dot"></div>
        ONLINE
      </div>
      <div class="toggle-wrap">
        <span class="toggle-label" id="toggle-label"><i data-lucide="sun" class="icon"></i></span>
        <label class="toggle">
          <input type="checkbox" id="theme-toggle" onchange="toggleTheme()"/>
          <div class="toggle-track"></div>
          <div class="toggle-thumb" id="toggle-thumb"><i data-lucide="moon" class="icon"></i></div>
        </label>
      </div>
    </div>
  </header>

  <!-- Chat area -->
  <div class="chat-area" id="chat-area">
    <div class="welcome" id="welcome">
      <span class="welcome-icon"><i data-lucide="shield-check" class="icon"></i></span>
      <h2>Paste any message below</h2>
      <p>I'll tell you instantly whether it's spam or a legitimate message using AI.</p>
      <div class="example-chips">
        <div class="chip" onclick="useExample(this)">Congratulations! You won $1000</div>
        <div class="chip" onclick="useExample(this)">Hey, are we still meeting tomorrow?</div>
        <div class="chip" onclick="useExample(this)">Claim your free prize now!</div>
      </div>
    </div>
  </div>

  <!-- Input area -->
  <div class="input-area">
    <div class="input-wrap">
      <textarea
        id="msg-input"
        placeholder="Paste or type a message to check..."
        rows="1"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"
      ></textarea>
      <button class="send-btn" id="send-btn" onclick="sendMessage()">
        <i data-lucide="send-horizontal" class="icon"></i>
      </button>
    </div>
    <div class="input-hint">Press Enter to send &nbsp;·&nbsp; Shift+Enter for new line</div>
  </div>

</div>

<script>
  function icon(name) {
    return `<i data-lucide="${name}" class="icon"></i>`;
  }

  function renderIcons() {
    if (window.lucide) {
      window.lucide.createIcons();
    }
  }

  document.addEventListener('DOMContentLoaded', renderIcons);

  // Theme toggle
  function toggleTheme() {
    const html = document.documentElement;
    const isDark = html.getAttribute('data-theme') === 'dark';
    html.setAttribute('data-theme', isDark ? 'light' : 'dark');
    document.getElementById('toggle-thumb').innerHTML = isDark ? icon('sun') : icon('moon');
    document.getElementById('toggle-label').innerHTML = isDark ? icon('moon') : icon('sun');
    renderIcons();
  }

  // Auto resize textarea
  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
  }

  // Handle Enter key
  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  // Use example chip
  function useExample(el) {
    const input = document.getElementById('msg-input');
    input.value = el.textContent;
    autoResize(input);
    input.focus();
  }

  // Add message bubble
  function addMessage(text, type) {
    const welcome = document.getElementById('welcome');
    if (welcome) welcome.remove();

    const chat = document.getElementById('chat-area');
    const div = document.createElement('div');
    div.className = `message ${type}`;

    if (type === 'user') {
      div.innerHTML = `
        <div class="avatar">${icon('user-round')}</div>
        <div class="bubble">${escapeHTML(text)}</div>
      `;
    } else {
      div.innerHTML = `
        <div class="avatar">${icon('shield-check')}</div>
        <div class="bubble">${text}</div>
      `;
    }

    chat.appendChild(div);
    renderIcons();
    chat.scrollTop = chat.scrollHeight;
    return div;
  }

  // Add typing indicator
  function addTyping() {
    const welcome = document.getElementById('welcome');
    if (welcome) welcome.remove();

    const chat = document.getElementById('chat-area');
    const div = document.createElement('div');
    div.className = 'message bot';
    div.id = 'typing-indicator';
    div.innerHTML = `
      <div class="avatar">${icon('shield-check')}</div>
      <div class="bubble">
        <div class="typing">
          <span></span><span></span><span></span>
        </div>
      </div>
    `;
    chat.appendChild(div);
    renderIcons();
    chat.scrollTop = chat.scrollHeight;
  }

  // Remove typing indicator
  function removeTyping() {
    const t = document.getElementById('typing-indicator');
    if (t) t.remove();
  }

  // Add result bubble
  function addResult(resultText) {
    const chat = document.getElementById('chat-area');
    const normalized = resultText.toLowerCase();
    const isSpam = normalized.includes('spam') && !normalized.includes('not spam');
    const label = isSpam ? 'Spam detected' : 'Not spam';

    const div = document.createElement('div');
    div.className = 'message bot';
    div.innerHTML = `
      <div class="avatar">${icon('shield-check')}</div>
      <div class="result-bubble ${isSpam ? 'spam' : 'ham'}">
        <div class="result-label">${icon(isSpam ? 'octagon-alert' : 'circle-check')} ${label}</div>
        <div class="result-sub">${isSpam ? 'THIS MESSAGE IS LIKELY SPAM' : 'THIS MESSAGE LOOKS SAFE'}</div>
      </div>
    `;
    chat.appendChild(div);
    renderIcons();
    chat.scrollTop = chat.scrollHeight;
  }

  // Escape HTML
  function escapeHTML(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // Send message
  async function sendMessage() {
    const input = document.getElementById('msg-input');
    const btn = document.getElementById('send-btn');
    const message = input.value.trim();
    if (!message) return;

    // Clear input
    input.value = '';
    input.style.height = 'auto';
    btn.disabled = true;

    // Show user message
    addMessage(message, 'user');

    // Show typing
    addTyping();

    try {
      const response = await fetch('/predict', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message })
      });

      const data = await response.json();
      removeTyping();
      addResult(data.result);

    } catch (err) {
      removeTyping();
      addMessage(`${icon('triangle-alert')} Could not connect to the server. Make sure Flask is running!`, 'bot');
    }

    btn.disabled = false;
    input.focus();
  }
</script>
</body>
</html>
